<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHTML Generator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; }
        h2 { color: #1a73e8; margin-top: 0; text-align: center; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #1557b0; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Document Generator</h2>
        <form action="/run-script" method="post">
            <label>नाम हिंदी में (Hindi Name):</label>
            <input type="text" name="name_hi" placeholder="उदा: अक्षय गुप्ता" required>
            
            <label>Full Name in English:</label>
            <input type="text" name="name_eng" placeholder="e.g. AKSHAY GUPTA" required>
            
            <button type="submit">Generate & Download MHTML</button>
        </form>
    </div>
</body>
</html>
